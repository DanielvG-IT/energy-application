services:
  influxdb:
    image: influxdb:2.7
    container_name: energy-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUX_USERNAME}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUX_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUX_BUCKET}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN}

  backend:
    build:
      context: ./backend/Energy.Api
    container_name: energy-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - influxdb
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Influx__Url: http://influxdb:8086
      Influx__Token: ${INFLUX_TOKEN}
      Influx__Org: ${INFLUX_ORG}
      Influx__Bucket: ${INFLUX_BUCKET}

  frontend:
    build:
      context: ./frontend
    container_name: energy-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  influxdb-data:
